<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IRISIS x SAT PEAK 2026 필드 테스트</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lucide-static@0.321.0/font/lucide.min.css">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        body { background-color: #020617; touch-action: manipulation; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const GAS_URL = "https://script.google.com/macros/s/AKfycby6zxTR51JT_JhAaknj5pctldH-k-9D-4Gm4O2QBOp1gnCeoj3i02qsUUSH53HR-Iak/exec";

        function App() {
            const [view, setView] = useState('loading'); // loading, profile, intro, guide, form
            const [user, setUser] = useState(null);
            const [config, setConfig] = useState({
                models: [],
                modelImages: [],
                lensColors: [],
                lensHexColors: [],
                altitudes: [],
                weathers: [],
                terrains: []
            });
            const [reviews, setReviews] = useState([]);
            const [pending, setPending] = useState([]);
            
            // 폼 상태
            const [base, setBase] = useState({ model: '', lensColor: '' });
            const [segments, setSegments] = useState([
                { id: 1, altitude: '', weather: '', terrain: '', contrast: 3, shadow: 3, brightness: 3, comfort: 3, comment: '' }
            ]);

            useEffect(() => {
                const savedUser = localStorage.getItem('irisis_user');
                const savedPending = localStorage.getItem('irisis_pending');
                if (savedUser) setUser(JSON.parse(savedUser));
                if (savedPending) setPending(JSON.parse(savedPending));
                initData();
            }, []);

            const initData = async () => {
                try {
                    const res = await fetch(GAS_URL);
                    const data = await res.json();
                    setConfig(data.config);
                    setReviews(data.reviews);
                    setBase({ model: data.config.models[0], lensColor: data.config.lensColors[0] });
                    setView(localStorage.getItem('irisis_user') ? 'intro' : 'profile');
                } catch (e) {
                    setView('profile');
                }
            };

            const handleSave = async () => {
                const newEntries = segments.map(s => ({ ...user, ...base, ...s }));
                const updatedPending = [...pending, ...newEntries];
                setPending(updatedPending);
                localStorage.setItem('irisis_pending', JSON.stringify(updatedPending));
                alert("기기에 임시 저장되었습니다. 통신 연결 시 자동 전송됩니다.");
                sync(updatedPending);
            };

            const sync = async (toSync) => {
                let current = [...toSync];
                for (const item of toSync) {
                    try {
                        const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(item) });
                        if (res.ok) {
                            current = current.filter(i => i !== item);
                            setPending([...current]);
                            localStorage.setItem('irisis_pending', JSON.stringify(current));
                        }
                    } catch (e) {
                        break;
                    }
                }
            };

            if (view === 'loading') return <div className="text-white p-10 text-center">데이터 동기화 중...</div>;

            if (view === 'profile') return (
                <div className="p-6 text-white min-h-screen flex flex-col justify-center">
                    <h1 className="text-2xl font-bold text-blue-400 mb-6">대원 등록</h1>
                    <input id="n" placeholder="이름" className="w-full p-4 bg-slate-900 rounded-xl mb-4 border border-slate-800" />
                    <select id="g" className="w-full p-4 bg-slate-900 rounded-xl mb-6 border border-slate-800">
                        <option value="미착용">안경 미착용</option>
                        <option value="안경">안경+선글라스</option>
                        <option value="도수클립">도수 클립</option>
                    </select>
                    <button onClick={() => {
                        const u = { name: document.getElementById('n').value, glasses: document.getElementById('g').value };
                        localStorage.setItem('irisis_user', JSON.stringify(u));
                        setUser(u); setView('intro');
                    }} className="bg-blue-600 p-4 rounded-xl font-bold">시작하기</button>
                </div>
            );

            if (view === 'intro') return (
                <div className="p-8 text-white text-center min-h-screen flex flex-col justify-center">
                    <div className="text-6xl mb-6">🏔️</div>
                    <h1 className="text-2xl font-bold mb-4 text-blue-400">IRISIS 필드 테스트</h1>
                    <p className="text-slate-400 text-sm mb-10 leading-relaxed">
                        산악인 선배 이리지스 대표님의 기술을<br/>삿피크 현장에서 직접 검증합니다.
                    </p>
                    <button onClick={() => setView('guide')} className="bg-blue-600 p-4 rounded-xl font-bold mb-4">테스트 가이드 확인</button>
                    <button onClick={() => setView('form')} className="bg-slate-800 p-4 rounded-xl font-bold">후기 작성하기</button>
                </div>
            );

            if (view === 'guide') return (
                <div className="p-6 text-slate-300 min-h-screen">
                    <h2 className="text-xl font-bold text-blue-400 mb-6 underline decoration-blue-500 flex items-center gap-2"><BookOpen /> 테스트 가이드</h2>
                    <ul className="space-y-4 text-sm">
                        <li className="bg-slate-900 p-4 rounded-xl"><b className="text-white">시야 증강:</b> 빛은 차단되나 시야는 밝고 뚜렷한지 확인.</li>
                        <li className="bg-slate-900 p-4 rounded-xl"><b className="text-white">그늘 시인성:</b> 빙하/바위 그늘에서 선글라스를 벗지 않아도 잘 보이는지 확인.</li>
                        <li className="bg-slate-900 p-4 rounded-xl"><b className="text-white">대비감도:</b> 눈밭의 미세한 굴곡과 크레바스가 잘 보이는지 확인.</li>
                    </ul>
                    <button onClick={() => setView('form')} className="mt-10 w-full bg-blue-600 p-4 rounded-xl font-bold text-white">이해했습니다</button>
                </div>
            );

            return (
                <div className="p-4 text-slate-200 pb-32 overflow-y-auto h-screen no-scrollbar">
                    {pending.length > 0 && <div className="bg-orange-600/20 p-2 text-[10px] text-orange-400 text-center mb-4 rounded border border-orange-500/50">미전송 데이터 {pending.length}건 대기 중 (연결 시 자동 전송)</div>}
                    
                    <div className="bg-slate-900 p-5 rounded-2xl mb-6 border border-slate-800">
                        <label className="block text-xs font-bold text-slate-500 mb-2 uppercase">착용 모델 선택</label>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-3 mb-6">
                            {config.models.map((m, index) => (
                                <button key={m} onClick={() => setBase({...base, model: m})} 
                                    className={`p-4 rounded-xl border-2 transition-all flex flex-col items-center ${
                                        base.model === m ? 'border-blue-500 bg-blue-500/10' : 'border-slate-800 bg-slate-800/50'
                                    }`}>
                                    <img src={config.modelImages[index]} alt={m} className="h-16 mb-2 object-contain"/>
                                    <span className={`text-xs ${base.model === m ? 'font-bold' : ''}`}>{m}</span>
                                </button>
                            ))}
                        </div>

                        <label className="block text-xs font-bold text-slate-500 mb-2 uppercase">렌즈 컬러 (컬러칩)</label>
                        <div className="flex flex-wrap gap-2">
                            {config.lensColors.map((c, index) => (
                                <button key={c} onClick={() => setBase({...base, lensColor: c})} 
                                    className={`px-3 py-1.5 rounded-full border text-[11px] shrink-0 flex items-center gap-1.5 ${
                                        base.lensColor === c ? 'border-white bg-white text-black' : 'border-slate-700 text-slate-500'
                                    }`}>
                                    <span className="w-3.5 h-3.5 rounded-full border border-slate-600" style={{ backgroundColor: config.lensHexColors[index] }}></span>
                                    {c}
                                </button>
                            ))}
                        </div>
                    </div>

                    {segments.map((s, idx) => (
                        <div key={s.id} className="bg-slate-900 p-4 rounded-2xl mb-4 border border-blue-900/30">
                            <div className="flex justify-between items-center mb-4 text-[10px] font-bold text-slate-500 uppercase"><span>환경 {idx+1}</span></div>
                            <div className="grid grid-cols-2 gap-2 mb-4">
                                <select onChange={e => setSegments(segments.map(i => i.id === s.id ? {...i, terrain: e.target.value} : i))} className="bg-slate-800 p-3 rounded-lg text-xs border-none uppercase">{config.terrains.map(t => <option key={t}>{t}</option>)}</select>
                                <select onChange={e => setSegments(segments.map(i => i.id === s.id ? {...i, weather: e.target.value} : i))} className="bg-slate-800 p-3 rounded-lg text-xs border-none uppercase">{config.weathers.map(w => <option key={w}>{w}</option>)}</select>
                            </div>
                            {['contrast', 'shadow', 'brightness'].map(key => (
                                <div key={key} className="mb-4">
                                    <div className="text-[10px] text-slate-500 mb-1">{key === 'contrast' ? '대비감도' : key === 'shadow' ? '그늘 시인성' : '시야 밝기'}</div>
                                    <div className="flex gap-1">
                                        {[1,2,3,4,5].map(v => <button key={v} onClick={() => setSegments(segments.map(i => i.id === s.id ? {...i, [key]: v} : i))} className={`flex-1 py-2 rounded text-sm ${s[key] >= v ? 'bg-blue-600' : 'bg-slate-800 text-slate-600'}`}>{v}</button>)}
                                    </div>
                                </div>
                            ))}
                        </div>
                    ))}
                    
                    <button onClick={() => setSegments([...segments, { id: Date.now(), altitude: '', weather: config.weathers[0], terrain: config.terrains[0], contrast: 3, shadow: 3, brightness: 3, comfort: 3, comment: '' }])} className="w-full border border-dashed border-slate-700 py-4 rounded-xl text-slate-500 text-sm mb-6">+ 다른 환경 추가</button>
                    <button onClick={handleSave} className="fixed bottom-6 left-6 right-6 bg-blue-600 p-4 rounded-xl font-bold shadow-2xl">후기 저장 및 전송</button>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
