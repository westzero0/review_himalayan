<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IRISIS x SAT PEAK 2026</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        body { background-color: #020617; -webkit-tap-highlight-color: transparent; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .tab-active { background: #2563eb; color: white; font-weight: 900; box-shadow: 0 0 15px rgba(37, 99, 235, 0.4); }
        .glass-card { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const GAS_URL = "https://script.google.com/macros/s/AKfycbz0KHnjCPPDMi6obrewlhcznhxqZOf47EVVgCg19XKW-dZwpr_4hGbT4KgQjPQj0hQq/exec";

        function App() {
            const [view, setView] = useState('loading');
            const [user, setUser] = useState(null);
            const [config, setConfig] = useState(null);
            const [pending, setPending] = useState([]);
            const [base, setBase] = useState({ model: '', lensColor: '' });
            const [session, setSession] = useState({ date: new Date().toISOString().split('T')[0], title: '' });
            const [segments, setSegments] = useState([{ id: Date.now(), terrain: '눈밭', weather: '맑음', colorMatch: 3, shadow: 3, contrast: 3, brightness: 3, comfort: 3, comment: '' }]);

            // 프로필 상태 (기존 설정 복구 및 개선)
            const [gender, setGender] = useState('여성');
            const [ageGroup, setAgeGroup] = useState('20대');
            const [visionType, setVisionType] = useState('안경 미착용');
            const [visionNote, setVisionNote] = useState('');

            useEffect(() => {
                const savedUser = localStorage.getItem('irisis_user');
                const savedPending = localStorage.getItem('irisis_pending');
                if (savedUser) setUser(JSON.parse(savedUser));
                if (savedPending) setPending(JSON.parse(savedPending));
                initData();
            }, []);

            const initData = async () => {
                try {
                    const res = await fetch(GAS_URL);
                    const data = await res.json();
                    setConfig(data.config);
                    setBase({ model: data.config.models[0], lensColor: data.config.lensColors[0] });
                    setView(localStorage.getItem('irisis_user') ? 'intro' : 'profile');
                } catch (e) { setView('profile'); }
            };

            const handleSave = async () => {
                if(!session.title) return alert("훈련명(예: 8차 훈련)을 입력해주세요.");
                const newEntries = segments.map(s => ({ ...user, ...base, ...s, date: session.date, title: session.title, timestamp: new Date().toISOString() }));
                const updatedPending = [...pending, ...newEntries];
                setPending(updatedPending);
                localStorage.setItem('irisis_pending', JSON.stringify(updatedPending));
                alert("✅ 기록 저장 완료!");
                sync(updatedPending);
                setSegments([{ id: Date.now(), terrain: config.terrains[0], weather: config.weathers[0], colorMatch: 3, shadow: 3, contrast: 3, brightness: 3, comfort: 3, comment: '' }]);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const sync = async (toSync) => {
                let current = [...toSync];
                for (const item of toSync) {
                    try {
                        const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(item) });
                        if (res.ok) {
                            current = current.filter(i => i !== item);
                            setPending([...current]);
                            localStorage.setItem('irisis_pending', JSON.stringify(current));
                        }
                    } catch (e) { break; }
                }
            };

            if (view === 'loading') return <div className="text-white p-20 text-center animate-pulse tracking-widest font-black">SYNCING...</div>;

            if (view === 'profile') return (
                <div className="p-8 text-white min-h-screen flex flex-col justify-center bg-[#020617]">
                    <h1 className="text-4xl font-black text-blue-500 mb-2 tracking-tighter italic">REGISTRATION</h1>
                    <p className="text-slate-500 mb-8 text-sm font-medium">대원 정보 및 시력 특이사항을 입력하세요.</p>
                    
                    <input id="n" placeholder="성함" className="w-full p-5 bg-slate-900 rounded-2xl mb-6 border border-slate-800 outline-none focus:border-blue-500 text-lg" />
                    
                    {/* 성할 탭 버튼 */}
                    <div className="flex bg-slate-900 rounded-2xl p-1.5 mb-6 border border-slate-800">
                        {['여성', '남성'].map(g => (
                            <button key={g} onClick={() => setGender(g)} className={`flex-1 py-3 rounded-xl text-sm transition-all ${gender === g ? 'tab-active' : 'text-slate-500'}`}>{g}</button>
                        ))}
                    </div>

                    {/* 연령대 선택 (20대 포함 수정) */}
                    <select value={ageGroup} onChange={e => setAgeGroup(e.target.value)} className="w-full p-5 bg-slate-900 rounded-2xl mb-6 border border-slate-800 outline-none appearance-none text-slate-300 font-bold">
                        <option value="20대">20대</option>
                        <option value="30대">30대</option>
                        <option value="40대">40대</option>
                        <option value="50대">50대</option>
                        <option value="60대 이상">60대 이상</option>
                    </select>
                    
                    {/* 시력 보정 (기존 설정 복구) */}
                    <select value={visionType} onChange={e => setVisionType(e.target.value)} className="w-full p-5 bg-slate-900 rounded-2xl mb-6 border border-slate-800 outline-none appearance-none text-slate-300 font-bold">
                        <option value="안경 미착용">안경 미착용</option>
                        <option value="도수클립">도수 클립 부착</option>
                        <option value="선글라스+안경">선글라스 + 안경 동시 착용</option>
                    </select>

                    <input type="text" placeholder="시각 특이사항 (난시, 근시, 빛번짐 등)" value={visionNote} onChange={e => setVisionNote(e.target.value)} className="w-full p-5 bg-slate-900 rounded-2xl mb-8 border border-slate-800 outline-none focus:border-blue-500 text-sm placeholder:text-slate-600" />

                    <button onClick={() => {
                        const name = document.getElementById('n').value;
                        if(!name) return alert("성함을 입력해주세요.");
                        const u = { name: name, gender: gender, age: ageGroup, glasses: visionType, visionNote: visionNote || '없음' };
                        localStorage.setItem('irisis_user', JSON.stringify(u));
                        setUser(u); setView('intro');
                    }} className="bg-blue-600 p-5 rounded-2xl font-black text-xl shadow-2xl active:scale-95 transition-transform">JOIN TEAM</button>
                </div>
            );

            if (view === 'intro') return (
                <div className="p-10 text-white text-center min-h-screen flex flex-col justify-center bg-[#020617]">
                    <h1 className="text-5xl font-black mb-2 tracking-tighter italic text-blue-500">IRISIS</h1>
                    <h2 className="text-xl font-bold mb-10 tracking-[0.2em] text-slate-500 uppercase">Field Test 2026</h2>
                    <p className="text-slate-400 text-sm mb-16 leading-relaxed font-medium px-2">
                        빛의 3원색을 제어하는 시야 증강 기술을<br/>
                        삿피크의 극한 환경에서 검증합니다.
                    </p>
                    <div className="space-y-4">
                        <button onClick={() => setView('guide')} className="w-full bg-white text-black p-5 rounded-2xl font-black text-lg">기술 설명 및 가이드</button>
                        <button onClick={() => setView('form')} className="w-full bg-slate-900 p-5 rounded-2xl font-black text-lg text-slate-400">테스트 시작</button>
                    </div>
                </div>
            );

            if (view === 'guide') return (
                <div className="p-8 text-slate-300 min-h-screen bg-[#020617] pb-32">
                    <h2 className="text-3xl font-black text-blue-500 mb-8 tracking-tighter italic">TECH & GUIDE</h2>
                    
                    <div className="mb-8 p-5 bg-blue-950/30 border border-blue-900/50 rounded-2xl">
                        <h3 className="text-blue-400 font-bold mb-3 text-sm">💡 VISION BOOSTER™ 란?</h3>
                        <p className="text-[10px] leading-relaxed text-slate-400 mb-3">
                            일반 렌즈처럼 빛을 덮어 시야를 어둡게 만드는 것이 아닙니다. 빛 속의 빨강, 파랑, 노랑을 제어하여 눈부심은 막고 윤곽은 뚜렷하게 살려주는 이리지스의 독자적인 시야식별력 증강 기술입니다.
                        </p>
                        <p className="text-[10px] leading-relaxed text-slate-400">
                            * 주의: 이 기술은 <span className="text-white font-bold">빨강, 파랑, 핑크 등 유색 렌즈</span>에서 진가를 발휘하며, 까만색/은색 렌즈에는 적용되지 않습니다.
                        </p>
                    </div>

                    <div className="space-y-6">
                        <div>
                            <h3 className="text-white font-black text-sm mb-1">01. VISION BOOSTER™ (지형/색상 매칭)</h3>
                            <p className="text-[10px] leading-relaxed text-slate-500">선택한 유색 렌즈가 눈밭, 암릉 등 현재 걷고 있는 지형의 특성과 잘 맞아떨어져 시야를 극대화하는지 평가합니다.</p>
                        </div>
                        <div>
                            <h3 className="text-white font-black text-sm mb-1">02. 음영 적응력 (Shadow)</h3>
                            <p className="text-[10px] leading-relaxed text-slate-500">강한 햇빛에서 빙하 그림자나 텐트 안으로 들어갈 때, 선글라스를 벗지 않아도 즉각적으로 시야 확보가 되는지 확인합니다.</p>
                        </div>
                        <div>
                            <h3 className="text-white font-black text-sm mb-1">03. SEO™ (초고해상도 입체감)</h3>
                            <p className="text-[10px] leading-relaxed text-slate-500">초선명 렌즈를 통해 눈밭의 미세한 굴곡과 크레바스 경계가 평면적이지 않고 입체적으로 분간되는지 체크합니다.</p>
                        </div>
                        <div>
                            <h3 className="text-white font-black text-sm mb-1">04. 시야 밝기 및 빛 번짐 제어</h3>
                            <p className="text-[10px] leading-relaxed text-slate-500">고산의 치명적인 눈부심과 난반사는 확실히 막아주면서도 전체적인 시야는 맑게 유지되는지 평가합니다.</p>
                        </div>
                        <div>
                            <h3 className="text-white font-black text-sm mb-1">05. FORTIS™ & RESILEX™ (안전/착용감)</h3>
                            <p className="text-[10px] leading-relaxed text-slate-500">방탄 렌즈의 안도감, 100% 자외선 차단 성능, 그리고 형상기억테가 영하에서도 부러지거나 흘러내림 없이 편안한지 확인합니다.</p>
                        </div>
                    </div>
                    <button onClick={() => setView('form')} className="fixed bottom-10 left-8 right-8 bg-blue-600 p-5 rounded-2xl font-black text-white shadow-2xl">START TEST</button>
                </div>
            );

            return (
                <div className="p-6 text-slate-200 pb-40 min-h-screen bg-[#020617] no-scrollbar overflow-y-auto">
                    <header className="flex justify-between items-center mb-6">
                        <span className="text-[10px] font-black text-blue-500 tracking-[0.3em] uppercase italic">Expedition Log</span>
                        <button onClick={() => setView('guide')} className="text-[10px] font-bold text-slate-600 border-b border-slate-800 pb-1">TECH GUIDE</button>
                    </header>

                    <div className="mb-10 bg-slate-900/40 p-5 rounded-2xl border border-slate-800">
                        <div className="mb-4">
                            <label className="text-[10px] font-black text-slate-500 uppercase mb-2 block tracking-widest">Date (날짜)</label>
                            <input type="date" value={session.date} onChange={e => setSession({...session, date: e.target.value})} className="w-full bg-slate-950 p-4 rounded-xl text-sm font-bold border border-slate-800 outline-none text-slate-300" />
                        </div>
                        <div>
                            <label className="text-[10px] font-black text-slate-500 uppercase mb-2 block tracking-widest">Title (훈련명)</label>
                            <input type="text" placeholder="예: 8차 훈련, 삿피크 베이스캠프" value={session.title} onChange={e => setSession({...session, title: e.target.value})} className="w-full bg-slate-950 p-4 rounded-xl text-sm font-bold border border-slate-800 outline-none placeholder:text-slate-700 text-slate-300" />
                        </div>
                    </div>

                    <div className="mb-10">
                        <label className="text-[10px] font-black text-slate-600 uppercase mb-4 block tracking-widest">Select Model</label>
                        <div className="grid grid-cols-3 gap-2">
                            {config.models.map((m, idx) => (
                                <button key={m} onClick={() => setBase({...base, model: m})} 
                                    className={`rounded-2xl border transition-all flex flex-col items-center overflow-hidden ${
                                        base.model === m ? 'border-blue-500 bg-white' : 'border-slate-800 bg-slate-900/30 opacity-60'
                                    }`}>
                                    <div className="w-full aspect-square flex items-center justify-center bg-slate-800">
                                        {config.modelImages[idx] && <img src={config.modelImages[idx]} className="w-full h-full object-cover" />}
                                    </div>
                                    <span className={`text-[9px] font-black tracking-tighter truncate w-full px-1 py-3 text-center ${
                                        base.model === m ? 'text-black' : 'text-slate-500'
                                    }`}>{m}</span>
                                </button>
                            ))}
                        </div>
                    </div>

                    <div className="mb-10">
                        <label className="text-[10px] font-black text-slate-600 uppercase mb-4 block tracking-widest">Lens Color (시야증강 컬러)</label>
                        <div className="flex gap-2 overflow-x-auto no-scrollbar pb-2">
                            {config.lensColors.map((c, idx) => (
                                <button key={c} onClick={() => setBase({...base, lensColor: c})} 
                                    className={`px-4 py-2.5 rounded-full border flex items-center gap-2 shrink-0 transition-all ${
                                        base.lensColor === c ? 'bg-white text-black border-white font-black' : 'bg-slate-900 text-slate-500 border-slate-800'
                                    }`}>
                                    <span className="w-2.5 h-2.5 rounded-full shadow-inner" style={{backgroundColor: config.lensHexColors[idx] || '#ccc'}}></span>
                                    <span className="text-[10px] uppercase font-bold tracking-tight">{c}</span>
                                </button>
                            ))}
                        </div>
                    </div>

                    {segments.map((s, idx) => (
                        <div key={s.id} className="glass-card p-5 rounded-3xl mb-6 relative overflow-hidden">
                            <div className="absolute top-0 right-0 p-3">
                                {segments.length > 1 && <button onClick={() => setSegments(segments.filter(i => i.id !== s.id))} className="text-red-900 text-[10px] font-black uppercase">Del</button>}
                            </div>
                            <span className="text-[9px] font-black text-slate-700 tracking-widest uppercase block mb-6 italic">Record {idx+1}</span>
                            
                            <div className="grid grid-cols-2 gap-3 mb-8">
                                <div className="space-y-1">
                                    <span className="text-[8px] font-bold text-slate-600 ml-1 uppercase">Terrain</span>
                                    <select value={s.terrain} onChange={e => setSegments(segments.map(i => i.id === s.id ? {...i, terrain: e.target.value} : i))} className="w-full bg-slate-950 p-4 rounded-2xl text-[11px] font-black border border-slate-800 outline-none appearance-none">
                                        {config.terrains.map(t => <option key={t}>{t}</option>)}
                                    </select>
                                </div>
                                <div className="space-y-1">
                                    <span className="text-[8px] font-bold text-slate-600 ml-1 uppercase">Weather</span>
                                    <select value={s.weather} onChange={e => setSegments(segments.map(i => i.id === s.id ? {...i, weather: e.target.value} : i))} className="w-full bg-slate-950 p-4 rounded-2xl text-[11px] font-black border border-slate-800 outline-none appearance-none">
                                        {config.weathers.map(w => <option key={w}>{w}</option>)}
                                    </select>
                                </div>
                            </div>

                            <RatingSystem value={s.colorMatch} onChange={(v) => setSegments(segments.map(i => i.id === s.id ? {...i, colorMatch: v} : i))} label="VISION BOOSTER™ (매칭도)" desc="렌즈 컬러가 현재 지형을 식별하는 데 최적의 시야를 제공하는가?" />
                            <RatingSystem value={s.shadow} onChange={(v) => setSegments(segments.map(i => i.id === s.id ? {...i, shadow: v} : i))} label="음영 적응력" desc="그늘이나 어두운 곳 진입 시 시야 확보가 즉각적인가?" />
                            <RatingSystem value={s.contrast} onChange={(v) => setSegments(segments.map(i => i.id === s.id ? {...i, contrast: v} : i))} label="SEO™ (초고해상도 입체감)" desc="바닥의 굴곡과 크레바스가 평면적이지 않고 입체적이고 뚜렷한가?" />
                            <RatingSystem value={s.brightness} onChange={(v) => setSegments(segments.map(i => i.id === s.id ? {...i, brightness: v} : i))} label="시야 밝기 체감" desc="눈부심은 확실히 막아주면서 시야는 전체적으로 맑고 환하게 유지되는가?" />
                            <RatingSystem value={s.comfort} onChange={(v) => setSegments(segments.map(i => i.id === s.id ? {...i, comfort: v} : i))} label="FORTIS™ & RESILEX™ (착용감)" desc="눈 피로도나 렌즈 김서림, 테의 눌림이나 흘러내림 없이 편안한가?" />

                            <textarea 
                                placeholder="기타 의견 및 특이사항(선택)" 
                                className="w-full bg-slate-950/50 p-5 rounded-2xl text-[11px] border border-slate-900 outline-none h-20 placeholder:text-slate-700 font-medium mt-2"
                                onChange={e => setSegments(segments.map(i => i.id === s.id ? {...i, comment: e.target.value} : i))}
                            />
                        </div>
                    ))}
                    
                    <button onClick={() => setSegments([...segments, { id: Date.now(), terrain: config.terrains[0], weather: config.weathers[0], colorMatch: 3, shadow: 3, contrast: 3, brightness: 3, comfort: 3, comment: '' }])} 
                        className="w-full bg-slate-900/30 border border-slate-800/50 py-5 rounded-3xl text-slate-500 text-[10px] font-black tracking-widest uppercase mb-12 active:bg-slate-900">
                        + Add Environment
                    </button>
                    
                    <button onClick={handleSave} className="fixed bottom-10 left-8 right-8 bg-blue-600 p-6 rounded-2xl font-black text-white shadow-2xl shadow-blue-900/50 text-xl italic tracking-tighter active:scale-95 transition-transform">
                        SUBMIT RECORD
                    </button>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
